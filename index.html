<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Yuyu&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Yuyu", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #d3d6dd;
        }

        button {
            font-family: "Yuyu", sans-serif;
        }

        .card {
            width: 600px;
            height: 500px;
            background: white;
            border-radius: 18px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
        }

        h1 {
            margin-bottom: 25px;
            font-size: 32px;
        }

        .title {
            color: #494749;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            margin-top: 15px;
        }

        span {
            font-size: 16px;
        }

        .mode {
            display: flex;
            gap: 20px;
            margin-bottom: 35px;
        }

        .option {
            flex: 1;
            border: 2px solid #ddd;
            border-radius: 12px;
            padding: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .option input {
            accent-color: #2563eb;
        }

        .option:has(input:checked) {
            border-color: #2563eb;
            background: #eef4ff;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid #b6b2b2;
        }

        button {
            width: 100%;
            margin-top: 30px;
            padding: 16px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            background: #1d4ed8;
        }

        .switch {
            position: relative;
            width: 60px;
            height: 32px;
        }

        .switch input {
            display: none;
        }

        .slider {
            position: absolute;
            inset: 0;
            background: #ccc;
            border-radius: 20px;
            transition: .3s;
        }

        .slider::before {
            content: "";
            position: absolute;
            width: 24px;
            height: 24px;
            left: 4px;
            top: 4px;
            background: white;
            border-radius: 50%;
            transition: .3s;
        }

        .switch input:checked+.slider {
            background: #2563eb;
        }

        .switch input:checked+.slider::before {
            transform: translateX(28px);
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Account settings</h1>
        <p class="title">INTERFACE MODE</p>
        <div class="mode">
            <label class="option">
                <input type="radio" name="mode">
                <span>Light mode</span>
            </label>

            <label class="option">
                <input type="radio" name="mode">
                <span>Dark mode</span>
            </label>
        </div>


        <p class="title">EMAIL NOTIFICATIONS</p>
        <div class="row">
            <span>New messeges in chat</span>
            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>

        <div class="row">
            <span>Weekly progress report</span>
            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>

        <button>Save setting</button>

    </div>
</body>

</html>
